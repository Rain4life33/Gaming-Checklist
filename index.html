<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quest Log</title>
    <style>
        /* THEME VARIABLES - Gemini/System Dark */
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #333333; --border: #eeeeee; --title: #333333; }
        
        [data-theme="dark"] { 
            --bg: #131314; --card: #1e1f20; --text: #e3e3e3; --border: #333537; --title: #ffffff; 
        }
        
        [data-theme="midnight"] { 
            --bg: #000000; --card: #0a0a0a; --text: #ffffff; --border: #222222; --title: #ffffff; 
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        
        .theme-switcher { margin-bottom: 20px; display: flex; gap: 8px; justify-content: center; width: 100%; max-width: 520px; }
        .theme-btn { padding: 6px 14px; cursor: pointer; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.8rem; font-weight: bold; }

        .container { background: var(--card); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 520px; border: 1px solid var(--border); }
        
        /* Title is now white in Dark/Midnight via variables */
        h2 { text-align: center; color: var(--title); margin-top: 0; font-size: 1.8rem; letter-spacing: 0.5px; }

        .total-display { font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; text-align: center; color: #2ecc71; }
        
        .input-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: #333; flex: 1; outline: none; }
        [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="midnight"] input, [data-theme="midnight"] select { background: #131314; color: #fff; }

        .add-btn { background: #6366f1; color: white; border: none; padding: 0 25px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 44px; }
        
        .sort-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .sort-btn { background: #e2e8f0; border: none; padding: 6px 15px; border-radius: 5px; color: #475569; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
        [data-theme="dark"] .sort-btn, [data-theme="midnight"] .sort-btn { background: #333537; color: #e3e3e3; }

        ul { list-style: none; padding: 0; width: 100%; }
        li { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-top: 1px solid var(--border); gap: 10px; }
        
        .item-main { display: flex; align-items: center; gap: 15px; flex-grow: 1; font-size: 1.05rem; }
        .checked-text { text-decoration: line-through; opacity: 0.4; }
        
        .actions { display: flex; align-items: center; gap: 10px; }
        .val-display { font-weight: bold; min-width: 90px; text-align: right; }
        
        .step-btn { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; width: 28px; height: 28px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;}
        .edit-btn { background: #f39c12; color: white; border: none; border-radius: 5px; padding: 6px 12px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .delete-btn { background: #ff4d4d; color: white; border: none; border-radius: 5px; padding: 6px 12px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body data-theme="dark">

    <div class="theme-switcher">
        <button class="theme-btn" onclick="setTheme('light')">☀️ Light</button>
        <button class="theme-btn" onclick="setTheme('dark')">🌙 Dark</button>
        <button class="theme-btn" onclick="setTheme('midnight')">🌑 Midnight</button>
    </div>

<div class="container">
    <h2>My Checklist</h2>
    <div class="total-display" id="grandTotal">$0.00 + 0 Quests</div>
    
    <div class="input-area">
        <div class="input-row">
            <input type="text" id="itemName" placeholder="Item name">
            <input type="number" id="itemPrice" placeholder="Price/Qty" step="0.01">
            <button class="add-btn" id="submitBtn" onclick="addItem()">Add</button>
        </div>
        <div class="input-row">
            <select id="itemType" style="flex: 1;">
                <option value="price">Price ($)</option>
                <option value="quest">Quest (Qty)</option>
            </select>
            <div class="sort-group" style="margin: 0; flex: 1.5;">
                <button class="sort-btn" onclick="sortItems('low')">Sort: Low</button>
                <button class="sort-btn" onclick="sortItems('high')">Sort: High</button>
            </div>
        </div>
    </div>
    <ul id="itemList"></ul>
</div>

<script>
    let items = [];
    let editIndex = -1;

    window.onload = function() {
        // --- DATA RECOVERY BLOCK ---
        const v1 = localStorage.getItem('myList');
        const v2 = localStorage.getItem('gamerLog');
        const v3 = localStorage.getItem('items');

        let rawData = v2 || v1 || v3;

        if (rawData) {
            let parsed = JSON.parse(rawData);
            items = parsed.map(i => ({
                name: i.name,
                price: parseFloat(i.price || i.val || i.valInput || 0),
                type: i.type || 'price',
                checked: i.checked || false
            }));
            save(); 
        }

        const savedTheme = localStorage.getItem('appTheme');
        if (savedTheme) { setTheme(savedTheme); }
        render();
    };

    function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('appTheme', t); }
    function save() { localStorage.setItem('gamerLog', JSON.stringify(items)); }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const p = parseFloat(document.getElementById('itemPrice').value);
        const t = document.getElementById('itemType').value;
        if (name && !isNaN(p)) {
            if (editIndex > -1) {
                items[editIndex] = { ...items[editIndex], name, price: p, type: t };
                editIndex = -1;
                document.getElementById('submitBtn').innerText = "Add";
            } else {
                items.push({ name, price: p, type: t, checked: false });
            }
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            save(); render();
        }
    }

    function updateQuest(idx, amt) {
        items[idx].price += amt;
        items[idx].checked = (items[idx].price <= 0);
        if (items[idx].price < 0) items[idx].price = 0;
        save(); render();
    }

    function toggleItem(idx) { items[idx].checked = !items[idx].checked; save(); render(); }
    function deleteItem(idx) { items.splice(idx, 1); save(); render(); }
    function sortItems(dir) { items.sort((a, b) => dir === 'low' ? a.price - b.price : b.price - a.price); save(); render(); }

    function editItem(idx) {
        document.getElementById('itemName').value = items[idx].name;
        document.getElementById('itemPrice').value = items[idx].price;
        document.getElementById('itemType').value = items[idx].type;
        editIndex = idx;
        document.getElementById('submitBtn').innerText = "Update";
    }

    function render() {
        const list = document.getElementById('itemList');
        const grandTotal = document.getElementById('grandTotal');
        list.innerHTML = '';
        let money = 0; let quests = 0;

        items.forEach((item, index) => {
            if (!item.checked) {
                if (item.type === 'price') money += item.price;
                else quests += item.price;
            }
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-main ${item.checked ? 'checked-text' : ''}">
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onclick="toggleItem(${index})">
                    <span>${item.name}</span>
                </div>
                <div class="actions">
                    <span class="val-display ${item.checked ? 'checked-text' : ''}">
                        ${item.type === 'quest' ? 
                        `<button class="step-btn" onclick="updateQuest(${index}, -1)">-</button> ${item.price} <button class="step-btn" onclick="updateQuest(${index}, 1)">+</button>` : 
                        `$${item.price.toLocaleString(undefined, {minimumFractionDigits: 2})}`}
                    </span>
                    <button class="edit-btn" onclick="editItem(${index})">Edit</button>
                    <button class="delete-btn" onclick="deleteItem(${index})">X</button>
                </div>`;
            list.appendChild(li);
        });
        grandTotal.innerText = `$${money.toLocaleString(undefined, {minimumFractionDigits: 2})} + ${quests} Quests`;
    }
</script>
</body>
</html>
